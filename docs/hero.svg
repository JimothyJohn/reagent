<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B6DEF"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B6DEF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#5B6DEF" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Ambient glow orbs -->
  <circle cx="200" cy="200" r="120" fill="#5B6DEF" opacity="0.06" filter="url(#blur2)"/>
  <circle cx="600" cy="180" r="100" fill="#34d399" opacity="0.05" filter="url(#blur2)"/>
  <circle cx="400" cy="300" r="80" fill="#5B6DEF" opacity="0.04" filter="url(#blur2)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#1e1e2e" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
  </g>

  <!-- Connection flow line -->
  <path d="M 130 200 C 200 200, 230 200, 290 200" stroke="url(#accent)" stroke-width="2" stroke-dasharray="6 4" opacity="0.6">
    <animate attributeName="stroke-dashoffset" values="0;-20" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 350 200 C 380 200, 420 200, 450 200" stroke="url(#accent)" stroke-width="2" stroke-dasharray="6 4" opacity="0.6">
    <animate attributeName="stroke-dashoffset" values="0;-20" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 510 200 C 540 200, 580 200, 610 200" stroke="url(#accent)" stroke-width="2" stroke-dasharray="6 4" opacity="0.6">
    <animate attributeName="stroke-dashoffset" values="0;-20" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Node 1: Teams -->
  <g filter="url(#shadow)">
    <rect x="60" y="160" width="80" height="80" rx="16" fill="#12121a" stroke="#5B6DEF" stroke-width="1.5"/>
    <text x="100" y="195" text-anchor="middle" font-size="28" fill="#5B6DEF">💬</text>
    <text x="100" y="225" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#e0e0e8">Teams</text>
  </g>

  <!-- Node 2: Azure Bot -->
  <g filter="url(#shadow)">
    <rect x="280" y="160" width="80" height="80" rx="16" fill="#12121a" stroke="#1e1e2e" stroke-width="1.5"/>
    <text x="320" y="195" text-anchor="middle" font-size="28" fill="#5B6DEF">☁️</text>
    <text x="320" y="225" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#e0e0e8">Azure</text>
  </g>

  <!-- Node 3: OpenClaw (highlighted) -->
  <g filter="url(#shadow)">
    <rect x="440" y="148" width="80" height="104" rx="16" fill="#16162a" stroke="url(#accent)" stroke-width="2"/>
    <circle cx="480" cy="200" r="30" fill="url(#glow)" filter="url(#blur1)"/>
    <text x="480" y="190" text-anchor="middle" font-size="28">⚡</text>
    <text x="480" y="218" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="#e0e0e8">OpenClaw</text>
    <text x="480" y="238" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#5B6DEF">gateway</text>
  </g>

  <!-- Node 4: AI Agent -->
  <g filter="url(#shadow)">
    <rect x="620" y="160" width="80" height="80" rx="16" fill="#12121a" stroke="#34d399" stroke-width="1.5"/>
    <text x="660" y="195" text-anchor="middle" font-size="28">🤖</text>
    <text x="660" y="225" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#e0e0e8">AI Agent</text>
  </g>

  <!-- Animated data packets -->
  <circle r="3" fill="#5B6DEF">
    <animateMotion dur="3s" repeatCount="indefinite" path="M 140 200 C 200 200, 230 200, 290 200"/>
  </circle>
  <circle r="3" fill="#5B6DEF" opacity="0.7">
    <animateMotion dur="3s" repeatCount="indefinite" begin="0.5s" path="M 360 200 C 390 200, 420 200, 440 200"/>
  </circle>
  <circle r="3" fill="#34d399">
    <animateMotion dur="3s" repeatCount="indefinite" begin="1s" path="M 520 200 C 550 200, 580 200, 620 200"/>
  </circle>

  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="36" font-weight="800" fill="url(#accent)">reagent</text>
  <text x="400" y="90" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" fill="#7a7a8e">self-hosted AI for Microsoft Teams</text>

  <!-- Bottom stats -->
  <g font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#7a7a8e">
    <text x="160" y="340" text-anchor="middle">B1s VM</text>
    <text x="160" y="358" text-anchor="middle" fill="#5B6DEF" font-weight="600">$12.78/mo</text>

    <text x="400" y="340" text-anchor="middle">bot tier</text>
    <text x="400" y="358" text-anchor="middle" fill="#34d399" font-weight="600">free</text>

    <text x="640" y="340" text-anchor="middle">setup</text>
    <text x="640" y="358" text-anchor="middle" fill="#5B6DEF" font-weight="600">5 min</text>
  </g>
</svg>
